                content: `# JavaScript高级特性

## 闭包
闭包是指有权访问另一个函数作用域中的变量的函数。

\`\`\`javascript
function outer() {
    let count = 0;
    return function inner() {
        count++;
        return count;
    }
}

const counter = outer();
console.log(counter()); // 1
console.log(counter()); // 2
\`\`\`

## Promise
Promise用于处理异步操作，避免回调地狱。

\`\`\`javascript
const fetchData = () => {
    return new Promise((resolve, reject) => {
        // 模拟异步操作
        setTimeout(() => {
            resolve({ data: "成功获取数据" });
        }, 1000);
    });
};

fetchData()
    .then(response => console.log(response.data))
    .catch(error => console.error(error));
\`\`\`

## Async/Await
Async/Await是基于Promise的语法糖，使异步代码看起来像同步代码。

\`\`\`javascript
async function getData() {
    try {
        const response = await fetch('https://api.example.com/data');
        const data = await response.json();
        console.log(data);
    } catch (error) {
        console.error("获取数据失败:", error);
    }
}
\`\`\`

## useState
用于在函数组件中添加状态。

\`\`\`jsx
import React, { useState } from 'react';

function Counter() {
    const [count, setCount] = useState(0);
    
    return (
        <div>
            <p>计数: {count}</p>
            <button onClick={() => setCount(count + 1)}>增加</button>
        </div>
    );
}
\`\`\`

## useEffect
用于处理副作用，相当于componentDidMount、componentDidUpdate和componentWillUnmount的组合。

\`\`\`jsx
import React, { useState, useEffect } from 'react';

function DataFetcher() {
    const [data, setData] = useState(null);
    
    useEffect(() => {
        // 组件挂载时获取数据
        fetch('/api/data')
            .then(res => res.json())
            .then(data => setData(data));
            
        // 清理函数（可选）
        return () => {
            // 取消请求或清理订阅
        };
    }, []); // 空依赖数组表示只在挂载时运行
    
    return <div>{data ? JSON.stringify(data) : '加载中...'}</div>;
}
\`\`\`

## 自定义Hook
可以将组件逻辑提取到可重用的函数中。

\`\`\`jsx
function useLocalStorage(key, initialValue) {
    const [storedValue, setStoredValue] = useState(() => {
        try {
            const item = window.localStorage.getItem(key);
            return item ? JSON.parse(item) : initialValue;
        } catch (error) {
            return initialValue;
        }
    });
    
    const setValue = value => {
        try {
            const valueToStore = value instanceof Function ? value(storedValue) : value;
            setStoredValue(valueToStore);
            window.localStorage.setItem(key, JSON.stringify(valueToStore));
        } catch (error) {
            console.log(error);
        }
    };
    
    return [storedValue, setValue];
}
\`\`\`

## 列表(List)
有序的可变集合。

\`\`\`python
# 创建列表
fruits = ['apple', 'banana', 'cherry']

# 添加元素
fruits.append('orange')

# 访问元素
print(fruits[0])  # apple

# 切片

\`\`\`

## 字典(Dictionary)
键值对的无序集合。

\`\`\`python
# 创建字典
person = {
    'name': 'Alice',
    'age': 30,
    'city': 'New York'
}

# 访问值
print(person['name'])  # Alice

# 添加新键值对
person['email'] = 'alice@example.com'

# 遍历字典
for key, value in person.items():
    print(f"{key}: {value}")
\`\`\`

无序的唯一元素集合。

\`\`\`python

numbers.add(6)

a = {1, 2, 3}

print(a | b)  # 并集: {1, 2, 3, 4, 5}
print(a & b)  # 交集: {3}
print(a - b)  # 差集: {1, 2}
\`\`\`

## 基本概念
Grid布局是一个二维布局系统，可以同时处理行和列。

## 创建网格容器
\`\`\`css
.container {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr; /* 三列等宽 */
    grid-template-rows: 100px auto;    /* 两行，第一行高100px */
    gap: 20px;                         /* 行列间距 */
}
\`\`\`

## 放置网格项
\`\`\`css
.item1 {
    grid-column: 1 / 3; /* 从第1列线到第3列线（占据两列） */
    grid-row: 1;        /* 第1行 */
}

.item2 {
    grid-column: 3;     /* 第3列 */
    grid-row: 1 / 3;    /* 从第1行线到第3行线（占据两行） */
}
\`\`\`

## 响应式网格
\`\`\`css
.container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
}
\`\`\`

## 网格区域命名
\`\`\`css
.container {
    display: grid;
    grid-template-areas:
        "header header header"
        "sidebar content content"
        "footer footer footer";
}

.header { grid-area: header; }
.sidebar { grid-area: sidebar; }
.content { grid-area: content; }
.footer { grid-area: footer; }
\`\`\`

## 核心概念
- **镜像(Image)**: 容器的只读模板
- **容器(Container)**: 镜像的运行实例
- **仓库(Repository)**: 存储镜像的地方

## 常用命令
\`\`\`bash
# 列出本地镜像
docker images

# 拉取镜像
docker pull ubuntu:20.04

# 运行容器
docker run -it --name my_container ubuntu:20.04 /bin/bash

# 列出运行中的容器
docker ps

# 列出所有容器（包括停止的）
docker ps -a

# 停止容器
docker stop my_container

# 启动容器
docker start my_container

# 删除容器
docker rm my_container

# 删除镜像
docker rmi ubuntu:20.04
\`\`\`

## Dockerfile示例
\`\`\`dockerfile
# 基础镜像
FROM node:14-alpine

# 设置工作目录
WORKDIR /app

# 复制依赖文件
COPY package*.json ./

# 安装依赖
RUN npm install

# 复制源代码
COPY . .

# 暴露端口
EXPOSE 3000

# 启动命令
CMD ["npm", "start"]
\`\`\`

## Docker Compose
用于定义和运行多容器应用。

\`\`\`yaml
version: '3'
services:
  web:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - .:/app
    environment:
      NODE_ENV: development
  db:
    image: mongo:4
    volumes:
      - ./data:/data/db
\`\`\`

## 冒泡排序
\`\`\`javascript
function bubbleSort(arr) {
    const n = arr.length;
    for (let i = 0; i < n - 1; i++) {
        for (let j = 0; j < n - i - 1; j++) {
            if (arr[j] > arr[j + 1]) {
                // 交换元素
                [arr[j], arr[j + 1]] = [arr[j + 1], arr[j]];
            }
        }
    }
    return arr;
}
\`\`\`
时间复杂度: O(n²)

## 快速排序
\`\`\`javascript
function quickSort(arr, low = 0, high = arr.length - 1) {
    if (low < high) {
        const pivotIndex = partition(arr, low, high);
        quickSort(arr, low, pivotIndex - 1);
        quickSort(arr, pivotIndex + 1, high);
    }
    return arr;
}

function partition(arr, low, high) {
    const pivot = arr[high];
    let i = low - 1;
    
    for (let j = low; j < high; j++) {
        if (arr[j] < pivot) {
            i++;
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
    }
    
    [arr[i + 1], arr[high]] = [arr[high], arr[i + 1]];
    return i + 1;
}
\`\`\`
时间复杂度: 平均 O(n log n)，最坏 O(n²)

## 归并排序
\`\`\`javascript
function mergeSort(arr) {
    if (arr.length <= 1) return arr;
    
    const mid = Math.floor(arr.length / 2);
    const left = mergeSort(arr.slice(0, mid));
    const right = mergeSort(arr.slice(mid));
    
    return merge(left, right);
}

function merge(left, right) {
    let result = [];
    let i = 0, j = 0;
    
    while (i < left.length && j < right.length) {
        if (left[i] < right[j]) {
            result.push(left[i]);
            i++;
        } else {
            result.push(right[j]);
            j++;
        }
    }
    
    return result.concat(left.slice(i)).concat(right.slice(j));
}
\`\`\`
时间复杂度: O(n log n)

                        <h3>没有找到笔记</h3>
                        <p>尝试更改搜索条件或创建新笔记</p>
                    </div>
                `;
                return;
            }
            
            notes.forEach(note => {
                const noteCard = document.createElement('div');
                noteCard.className = 'note-card';
                noteCard.dataset.id = note.id;
                
                noteCard.innerHTML = `
                    <div class="note-thumbnail">${note.thumbnail}</div>
                    <div class="note-content">
                        <h3>${note.title}</h3>
                        <div class="note-meta">
                            <span>${note.date}</span>
                            <span>${getCategoryIcon(note.category)} ${getCategoryName(note.category)}</span>
                        </div>
                        <div class="note-tags">
                            ${note.tags.map(tag => `<span class="note-tag">${tag}</span>`).join('')}
                        </div>
                    </div>
                `;
                
                notesGrid.appendChild(noteCard);

            if (!selectedNoteId && notes.length > 0) {
                selectNote(notes[0].id);

                'web': 'Web开发',

                'algorithm': '算法',
                'devops': 'DevOps',
                'database': '数据库'
            };
            return categories[category] || category;

        function getCategoryIcon(category) {
            const icons = {
                'web': '🌐',
                'language': '💻',
                'algorithm': '🧠',
                'devops': '🔧',
                'database': '🗄️'
            };
            return icons[category] || '📝';

        function filterNotes() {
            let filteredNotes = notesData;
            
            // 按分类过滤

                filteredNotes = filteredNotes.filter(note => note.category === currentCategory);

                filteredNotes = filteredNotes.filter(note =>

                    note.content.toLowerCase().includes(searchLower) ||
                    note.tags.some(tag => tag.toLowerCase().includes(searchLower))
                );

        // 设置事件监听器
        function setupEventListeners() {

            notesGrid.addEventListener('click', (e) => {
                const card = e.target.closest('.note-card');
                if (card) {
                    const noteId = parseInt(card.dataset.id);
                    selectNote(noteId);
                }
            });

                filterNotes();

                    filterNotes();
                });
            });
