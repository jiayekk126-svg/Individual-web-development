<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown学习笔记管理系统</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/4.3.0/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/highlight.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        :root {
            --primary: #4361ee;
            --secondary: #3f37c9;
            --accent: #4895ef;
            --light: #f8f9fa;
            --dark: #212529;
            --success: #4cc9f0;
            --warning: #f72585;
            --gray: #6c757d;
            --light-gray: #e9ecef;
            --border-radius: 12px;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            --transition: all 0.3s ease;
        }
        
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #e4edf5 100%);
            color: var(--dark);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1600px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 280px 1fr 1.2fr;
            gap: 25px;
            height: calc(100vh - 40px);
        }
        
        /* 侧边栏样式 */
        .sidebar {
            background: white;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            padding: 25px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--light-gray);
        }
        
        .logo i {
            font-size: 28px;
            color: var(--primary);
        }
        
        .logo h1 {
            font-size: 22px;
            font-weight: 700;
            color: var(--dark);
        }
        
        .search-box {
            position: relative;
            margin-bottom: 25px;
        }
        
        .search-box input {
            width: 100%;
            padding: 12px 15px 12px 45px;
            border: 1px solid var(--light-gray);
            border-radius: 50px;
            font-size: 15px;
            transition: var(--transition);
        }
        
        .search-box input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(72, 149, 239, 0.2);
        }
        
        .search-box i {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--gray);
        }
        
        .categories h3, .tags h3 {
            font-size: 16px;
            margin: 20px 0 15px;
            color: var(--dark);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .category-list, .tag-list {
            list-style: none;
        }
        
        .category-item, .tag-item {
            padding: 10px 15px;
            border-radius: 8px;
            margin-bottom: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: var(--transition);
        }
        
        .category-item:hover, .tag-item:hover {
            background: var(--light-gray);
        }
        
        .category-item.active, .tag-item.active {
            background: rgba(67, 97, 238, 0.1);
            color: var(--primary);
            font-weight: 500;
        }
        
        .category-item i, .tag-item i {
            width: 20px;
            text-align: center;
        }
        
        .tag-item {
            display: inline-block;
            margin-right: 8px;
            margin-bottom: 8px;
            padding: 6px 12px;
            font-size: 13px;
        }
        
        /* 笔记列表样式 */
        .notes-section {
            background: white;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            padding: 25px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }
        
        .section-header h2 {
            font-size: 20px;
            color: var(--dark);
        }
        
        .btn {
            padding: 10px 20px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 500;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: var(--transition);
        }
        
        .btn:hover {
            background: var(--secondary);
            transform: translateY(-2px);
        }
        
        .notes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 20px;
            overflow-y: auto;
            padding: 5px;
        }
        
        .note-card {
            background: white;
            border-radius: var(--border-radius);
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.05);
            overflow: hidden;
            transition: var(--transition);
            border: 1px solid var(--light-gray);
            cursor: pointer;
        }
        
        .note-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
        }
        
        .note-card.active {
            border: 2px solid var(--primary);
            background-color: rgba(67, 97, 238, 0.05);
        }
        
        .note-thumbnail {
            height: 140px;
            background: linear-gradient(135deg, #4361ee, #4cc9f0);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 48px;
        }
        
        .note-content {
            padding: 18px;
        }
        
        .note-content h3 {
            font-size: 16px;
            margin-bottom: 8px;
            color: var(--dark);
        }
        
        .note-meta {
            display: flex;
            justify-content: space-between;
            color: var(--gray);
            font-size: 13px;
            margin-bottom: 12px;
        }
        
        .note-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        
        .note-tag {
            background: rgba(67, 97, 238, 0.1);
            color: var(--primary);
            font-size: 12px;
            padding: 4px 10px;
            border-radius: 50px;
        }
        
        /* 预览区样式 */
        .preview-section {
            background: white;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .preview-header {
            padding: 20px 25px;
            border-bottom: 1px solid var(--light-gray);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .preview-header h2 {
            font-size: 20px;
            color: var(--dark);
        }
        
        .preview-actions {
            display: flex;
            gap: 12px;
        }
        
        .action-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--light);
            color: var(--gray);
            border: none;
            cursor: pointer;
            transition: var(--transition);
        }
        
        .action-btn:hover {
            background: var(--primary);
            color: white;
        }
        
        .preview-content {
            padding: 25px;
            overflow-y: auto;
            height: 100%;
        }
        
        .markdown-body {
            line-height: 1.6;
        }
        
        .markdown-body h1, 
        .markdown-body h2, 
        .markdown-body h3 {
            margin-top: 24px;
            margin-bottom: 16px;
            color: var(--dark);
            border-bottom: 1px solid var(--light-gray);
            padding-bottom: 8px;
        }
        
        .markdown-body h1 {
            font-size: 28px;
        }
        
        .markdown-body h2 {
            font-size: 24px;
        }
        
        .markdown-body h3 {
            font-size: 20px;
        }
        
        .markdown-body p {
            margin-bottom: 16px;
        }
        
        .markdown-body pre {
            background: #2d2d2d;
            border-radius: 8px;
            padding: 16px;
            overflow-x: auto;
            margin-bottom: 20px;
        }
        
        .markdown-body code {
            font-family: 'Fira Code', monospace;
            font-size: 14px;
        }
        
        .markdown-body blockquote {
            border-left: 4px solid var(--accent);
            padding: 0 16px;
            color: var(--gray);
            margin: 0 0 16px;
        }
        
        .markdown-body table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }
        
        .markdown-body th, 
        .markdown-body td {
            border: 1px solid var(--light-gray);
            padding: 8px 12px;
            text-align: left;
        }
        
        .markdown-body th {
            background: var(--light);
        }
        
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--gray);
            text-align: center;
            padding: 30px;
        }
        
        .empty-state i {
            font-size: 64px;
            margin-bottom: 20px;
            color: var(--light-gray);
        }
        
        .empty-state h3 {
            font-size: 20px;
            margin-bottom: 10px;
            color: var(--dark);
        }
        
        .loading-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--gray);
            text-align: center;
            padding: 30px;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(67, 97, 238, 0.2);
            border-top: 5px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .editor-container {
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        
        .editor-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .editor-textarea {
            width: 100%;
            flex: 1;
            padding: 15px;
            border: 1px solid var(--light-gray);
            border-radius: 8px;
            font-family: 'Fira Code', monospace;
            font-size: 14px;
            resize: none;
            background: #f8f9fa;
        }
        
        .editor-textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(72, 149, 239, 0.2);
        }
        
        .editor-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        
        .editor-btn {
            padding: 8px 16px;
            border-radius: 6px;
            border: none;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
        }
        
        .save-btn {
            background: var(--primary);
            color: white;
        }
        
        .save-btn:hover {
            background: var(--secondary);
        }
        
        .cancel-btn {
            background: var(--light-gray);
            color: var(--dark);
        }
        
        .cancel-btn:hover {
            background: #d1d5db;
        }
        
        /* 响应式设计 */
        @media (max-width: 1200px) {
            .container {
                grid-template-columns: 250px 1fr;
                grid-template-rows: auto 1fr;
            }
            
            .preview-section {
                grid-column: span 2;
            }
        }
        
        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
                height: auto;
            }
            
            .preview-section {
                grid-column: span 1;
            }
            
            .notes-grid {
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            }
        }
        
        /* 滚动条样式 */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: var(--light-gray);
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #c1c1c1;
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: #a8a8a8;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 侧边栏 -->
        <div class="sidebar">
            <div class="logo">
                <i class="fas fa-book-open"></i>
                <h1>Markdown笔记库</h1>
            </div>
            
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="搜索笔记...">
            </div>
            
            <div class="categories">
                <h3><i class="fas fa-folder"></i> 分类</h3>
                <ul class="category-list">
                    <li class="category-item active" data-category="all">
                        <i class="fas fa-layer-group"></i> 全部笔记
                    </li>
                    <li class="category-item" data-category="web">
                        <i class="fas fa-globe"></i> Web开发
                    </li>
                    <li class="category-item" data-category="language">
                        <i class="fas fa-language"></i> 编程语言
                    </li>
                    <li class="category-item" data-category="algorithm">
                        <i class="fas fa-brain"></i> 算法与数据结构
                    </li>
                    <li class="category-item" data-category="devops">
                        <i class="fas fa-server"></i> DevOps
                    </li>
                    <li class="category-item" data-category="database">
                        <i class="fas fa-database"></i> 数据库
                    </li>
                </ul>
            </div>
            
            <div class="tags">
                <h3><i class="fas fa-tags"></i> 热门标签</h3>
                <div class="tag-list">
                    <span class="tag-item active">JavaScript</span>
                    <span class="tag-item">React</span>
                    <span class="tag-item">Vue</span>
                    <span class="tag-item">Node.js</span>
                    <span class="tag-item">Python</span>
                    <span class="tag-item">CSS</span>
                    <span class="tag-item">HTML</span>
                    <span class="tag-item">Git</span>
                    <span class="tag-item">Docker</span>
                    <span class="tag-item">MongoDB</span>
                </div>
            </div>
        </div>
        
        <!-- 笔记列表区 -->
        <div class="notes-section">
            <div class="section-header">
                <h2>学习笔记</h2>
                <button class="btn" id="newNoteBtn">
                    <i class="fas fa-plus"></i> 新建笔记
                </button>
            </div>
            
            <div class="notes-grid" id="notesGrid">
                <!-- 笔记卡片将通过JS动态生成 -->
            </div>
        </div>
        
        <!-- 预览区 -->
        <div class="preview-section">
            <div class="preview-header">
                <h2 id="previewTitle">选择笔记进行预览</h2>
                <div class="preview-actions">
                    <button class="action-btn" id="editBtn" title="编辑">
                        <i class="fas fa-edit"></i>
                    </button>
                    <button class="action-btn" id="downloadBtn" title="下载">
                        <i class="fas fa-download"></i>
                    </button>
                    <button class="action-btn" id="deleteBtn" title="删除">
                        <i class="fas fa-trash"></i>
                    </button>
                </div>
            </div>
            
            <div class="preview-content" id="previewContent">
                <div class="empty-state">
                    <i class="fas fa-file-alt"></i>
                    <h3>没有选择笔记</h3>
                    <p>从左侧列表中选择一个笔记进行预览</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 初始化Marked.js和Highlight.js
        marked.setOptions({
            breaks: true,
            highlight: function(code, lang) {
                const language = hljs.getLanguage(lang) ? lang : 'plaintext';
                return hljs.highlight(code, { language }).value;
            }
        });
        
        // 笔记配置 - 指向实际的Markdown文件路径
        let notesConfig = [
            {
                id: 1,
                title: "JavaScript高级特性",
                category: "language",
                tags: ["JavaScript", "ES6"],
                date: "2023-06-15",
                thumbnail: "JS",
                filePath: "notes/javascript-advanced.md",
                content: ""
            },
            {
                id: 2,
                title: "React Hooks指南",
                category: "web",
                tags: ["React", "Hooks"],
                date: "2023-07-02",
                thumbnail: "⚛️",
                filePath: "notes/react-hooks.md",
                content: ""
            },
            {
                id: 3,
                title: "Python数据结构",
                category: "language",
                tags: ["Python", "数据结构"],
                date: "2023-05-20",
                thumbnail: "🐍",
                filePath: "notes/python-data-structures.md",
                content: ""
            },
            {
                id: 4,
                title: "CSS Grid布局",
                category: "web",
                tags: ["CSS", "布局"],
                date: "2023-06-28",
                thumbnail: "📐",
                filePath: "notes/css-grid-layout.md",
                content: ""
            },
            {
                id: 5,
                title: "Docker入门指南",
                category: "devops",
                tags: ["Docker", "容器"],
                date: "2023-07-10",
                thumbnail: "��",
                filePath: "notes/docker-guide.md",
                content: ""
            },
            {
                id: 6,
                title: "算法：排序算法",
                category: "algorithm",
                tags: ["算法", "排序"],
                date: "2023-05-15",
                thumbnail: "🔢",
                filePath: "notes/sorting-algorithms.md",
                content: ""
            }
        ];

        // DOM元素
        const notesGrid = document.getElementById('notesGrid');
        const previewContent = document.getElementById('previewContent');
        const previewTitle = document.getElementById('previewTitle');
        const searchInput = document.getElementById('searchInput');
        const categoryItems = document.querySelectorAll('.category-item');
        const tagItems = document.querySelectorAll('.tag-item');
        const newNoteBtn = document.getElementById('newNoteBtn');
        const editBtn = document.getElementById('editBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const deleteBtn = document.getElementById('deleteBtn');

        // 当前选中的分类和标签
        let currentCategory = 'all';
        let currentTag = '';
        let currentSearch = '';
        let selectedNoteId = null;
        let isEditing = false;

        // 初始化页面
        function initPage() {
            renderNotes(notesConfig);
            setupEventListeners();
        }

        // 渲染笔记列表
        function renderNotes(notes) {
            notesGrid.innerHTML = '';
            
            if (notes.length === 0) {
                notesGrid.innerHTML = `
                    <div class="empty-state" style="grid-column: 1/-1;">
                        <i class="fas fa-inbox"></i>
                        <h3>没有找到笔记</h3>
                        <p>尝试更改搜索条件或创建新笔记</p>
                    </div>
                `;
                return;
            }
            
            notes.forEach(note => {
                const noteCard = document.createElement('div');
                noteCard.className = `note-card ${selectedNoteId === note.id ? 'active' : ''}`;
                noteCard.dataset.id = note.id;
                
                noteCard.innerHTML = `
                    <div class="note-thumbnail">${note.thumbnail}</div>
                    <div class="note-content">
                        <h3>${note.title}</h3>
                        <div class="note-meta">
                            <span>${note.date}</span>
                            <span>${getCategoryIcon(note.category)} ${getCategoryName(note.category)}</span>
                        </div>
                        <div class="note-tags">
                            ${note.tags.map(tag => `<span class="note-tag">${tag}</span>`).join('')}
                        </div>
                    </div>
                `;
                
                notesGrid.appendChild(noteCard);
            });
            
            // 选中第一个笔记
            if (!selectedNoteId && notes.length > 0) {
                selectNote(notes[0].id);
            }
        }

        // 获取分类名称
        function getCategoryName(category) {
            const categories = {
                'web': 'Web开发',
                'language': '编程语言',
                'algorithm': '算法',
                'devops': 'DevOps',
                'database': '数据库'
            };
            return categories[category] || category;
        }

        // 获取分类图标
        function getCategoryIcon(category) {
            const icons = {
                'web': '🌐',
                'language': '💻',
                'algorithm': '🧠',
                'devops': '🔧',
                'database': '🗄️'
            };
            return icons[category] || '📝';
        }

        // 选择笔记
        function selectNote(noteId) {
            selectedNoteId = noteId;
            const note = notesConfig.find(n => n.id === noteId);
            
            if (note) {
                previewTitle.textContent = note.title;
                
                if (isEditing) {
                    exitEditMode();
                }
                
                // 显示加载状态
                previewContent.innerHTML = `
                    <div class="loading-state">
                        <div class="spinner"></div>
                        <h3>正在加载笔记...</h3>
                        <p>请稍候，正在从服务器获取内容</p>
                    </div>
                `;
                
                // 获取Markdown文件内容
                if (note.filePath && !note.content) {
                    fetchMarkdownFile(note.filePath, note);
                } else {
                    // 如果内容已加载或没有文件路径（新建笔记）
                    displayNoteContent(note);
                }
            }
            
            // 更新卡片选中状态
            document.querySelectorAll('.note-card').forEach(card => {
                card.classList.toggle('active', parseInt(card.dataset.id) === noteId);
            });
        }

        // 获取Markdown文件内容
        function fetchMarkdownFile(filePath, note) {
            fetch(filePath)
                .then(response => {
                    if (!response.ok) {
                        throw new Error(`无法加载文件: ${filePath}`);
                    }
                    return response.text();
                })
                .then(content => {
                    note.content = content;
                    displayNoteContent(note);
                })
                .catch(error => {
                    console.error('加载Markdown文件出错:', error);
                    previewContent.innerHTML = `
                        <div class="empty-state">
                            <i class="fas fa-exclamation-triangle"></i>
                            <h3>加载笔记失败</h3>
                            <p>${error.message}</p>
                            <p>请检查文件路径是否正确</p>
                        </div>
                    `;
                });
        }

        // 显示笔记内容
        function displayNoteContent(note) {
            const htmlContent = marked.parse(note.content);
            
            previewContent.innerHTML = `
                <div class="markdown-body">
                    ${htmlContent}
                </div>
            `;
            
            // 高亮代码块
            document.querySelectorAll('pre code').forEach((block) => {
                hljs.highlightElement(block);
            });
        }

        // 进入编辑模式
        function enterEditMode(note) {
            isEditing = true;
            
            previewContent.innerHTML = `
                <div class="editor-container">
                    <div class="editor-header">
                        <h3>编辑笔记: ${note.title}</h3>
                    </div>
                    <textarea class="editor-textarea" id="editorTextarea">${note.content}</textarea>
                    <div class="editor-actions">
                        <button class="editor-btn save-btn" id="saveEditBtn">保存</button>
                        <button class="editor-btn cancel-btn" id="cancelEditBtn">取消</button>
                    </div>
                </div>
            `;
            
            // 添加事件监听器
            document.getElementById('saveEditBtn').addEventListener('click', () => {
                saveEditedContent(note);
            });
            
            document.getElementById('cancelEditBtn').addEventListener('click', () => {
                exitEditMode();
                displayNoteContent(note);
            });
        }

        // 退出编辑模式
        function exitEditMode() {
            isEditing = false;
        }

        // 保存编辑后的内容
        function saveEditedContent(note) {
            const textarea = document.getElementById('editorTextarea');
            note.content = textarea.value;
            
            // 如果是新建笔记（没有文件路径），则设置为已修改
            if (!note.filePath) {
                note.modified = true;
            }
            
            exitEditMode();
            displayNoteContent(note);
        }

        // 下载笔记
        function downloadNote(note) {
            const content = note.content || '';
            const blob = new Blob([content], { type: 'text/markdown' });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            a.download = `${note.title.replace(/\s+/g, '_')}.md`;
            document.body.appendChild(a);
            a.click();
            
            // 清理
            setTimeout(() => {
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            }, 0);
        }

        // 删除笔记
        function deleteNote(noteId) {
            if (confirm('确定要删除此笔记吗？此操作不可撤销。')) {
                notesConfig = notesConfig.filter(note => note.id !== noteId);
                
                if (selectedNoteId === noteId) {
                    selectedNoteId = null;
                    previewContent.innerHTML = `
                        <div class="empty-state">
                            <i class="fas fa-file-alt"></i>
                            <h3>没有选择笔记</h3>
                            <p>从左侧列表中选择一个笔记进行预览</p>
                        </div>
                    `;
                    previewTitle.textContent = '选择笔记进行预览';
                }
                
                renderNotes(notesConfig);
            }
        }

        // 创建新笔记
        function createNewNote() {
            const newId = notesConfig.length > 0 ? Math.max(...notesConfig.map(n => n.id)) + 1 : 1;
            const today = new Date().toISOString().split('T')[0];
            
            const newNote = {
                id: newId,
                title: "新笔记",
                category: "web",
                tags: ["新笔记"],
                date: today,
                thumbnail: "📄",
                filePath: "",
                content: "# 新笔记\n\n在这里写下你的学习内容..."
            };
            
            notesConfig.unshift(newNote);
            renderNotes(notesConfig);
            selectNote(newId);
            enterEditMode(newNote);
        }

        // 过滤笔记
        function filterNotes() {
            let filteredNotes = notesConfig;
            
            // 按分类过滤
            if (currentCategory !== 'all') {
                filteredNotes = filteredNotes.filter(note => note.category === currentCategory);
            }
            
            // 按标签过滤
            if (currentTag) {
                filteredNotes = filteredNotes.filter(note => note.tags.includes(currentTag));
            }
            
            // 按搜索词过滤
            if (currentSearch) {
                const searchLower = currentSearch.toLowerCase();
                filteredNotes = filteredNotes.filter(note => 
                    note.title.toLowerCase().includes(searchLower) || 
                    note.tags.some(tag => tag.toLowerCase().includes(searchLower)) ||
                    (note.content && note.content.toLowerCase().includes(searchLower))
                );
            }
            
            renderNotes(filteredNotes);
        }

        // 设置事件监听器
        function setupEventListeners() {
            // 笔记卡片点击
            notesGrid.addEventListener('click', (e) => {
                const card = e.target.closest('.note-card');
                if (card) {
                    const noteId = parseInt(card.dataset.id);
                    selectNote(noteId);
                }
            });
            
            // 搜索输入
            searchInput.addEventListener('input', (e) => {
                currentSearch = e.target.value.trim();
                filterNotes();
            });
            
            // 分类点击
            categoryItems.forEach(item => {
                item.addEventListener('click', () => {
                    categoryItems.forEach(i => i.classList.remove('active'));
                    item.classList.add('active');
                    currentCategory = item.dataset.category;
                    filterNotes();
                });
            });
            
            // 标签点击
            tagItems.forEach(item => {
                item.addEventListener('click', () => {
                    // 切换选中状态
                    const wasActive = item.classList.contains('active');
                    tagItems.forEach(i => i.classList.remove('active'));
                    
                    if (!wasActive) {
                        item.classList.add('active');
                        currentTag = item.textContent;
                    } else {
                        currentTag = '';
                    }
                    
                    filterNotes();
                });
            });
            
            // 新建笔记按钮
            newNoteBtn.addEventListener('click', createNewNote);
            
            // 编辑按钮
            editBtn.addEventListener('click', () => {
                if (selectedNoteId) {
                    const note = notesConfig.find(n => n.id === selectedNoteId);
                    if (note) {
                        enterEditMode(note);
                    }
                }
            });
            
            // 下载按钮
            downloadBtn.addEventListener('click', () => {
                if (selectedNoteId) {
                    const note = notesConfig.find(n => n.id === selectedNoteId);
                    if (note) {
                        downloadNote(note);
                    }
                }
            });
            
            // 删除按钮
            deleteBtn.addEventListener('click', () => {
                if (selectedNoteId) {
                    deleteNote(selectedNoteId);
                }
            });
        }

        // 页面加载完成后初始化
        window.addEventListener('DOMContentLoaded', initPage);
    </script>
</body>
</html>
